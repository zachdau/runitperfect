  NE:{name:"Patriots",c:"#002244"},NO:{name:"Saints",c:"#D3BC8D"},
  NYG:{name:"Giants",c:"#0B2265"},NYJ:{name:"Jets",c:"#125740"},
  PHI:{name:"Eagles",c:"#004C54"},PIT:{name:"Steelers",c:"#FFB612"},
  SF:{name:"49ers",c:"#AA0000"},SEA:{name:"Seahawks",c:"#002244"},
  TB:{name:"Buccaneers",c:"#D50A0A"},TEN:{name:"Titans",c:"#0C2340"},
  WAS:{name:"Commanders",c:"#5A1414"},
};

const SLOT_LABELS = ["QB", "RB", "WR1", "TE", "WR2"];
const POS_FOR_SLOT = ["QB", "RB", "WR", "TE", "WR"];

// ===== GAME ENGINE =====
function playerValue(p) {
  if (p.p === "QB") return (p.py / 100) + (p.ptd * 3) - (p.int * 2) + (p.r / 10);
  if (p.p === "RB") return (p.ry / 50) + (p.rtd * 4) + (p.ypc * 3);
  if (p.p === "TE") return (p.rec / 4) + (p.recy / 40) + (p.retd * 5);
  return (p.rec / 5) + (p.recy / 50) + (p.retd * 4); // WR
}

function simulate(roster) {
  const total = roster.reduce((sum, p) => sum + playerValue(p), 0);
  const raw = 17 / (1 + Math.exp(-(total - 380) / 55));
  const noise = (Math.random() - 0.5) * 2;
  return Math.max(0, Math.min(17, Math.round(raw + noise)));
}

function getPoints(roster) {
  return Math.round(roster.reduce((sum, p) => sum + playerValue(p), 0));
}

// ===== MAIN COMPONENT =====
function RunItPerfect() {
  const [screen, setScreen] = useState("menu");
  const [roster, setRoster] = useState([null, null, null, null, null]);
  const [round, setRound] = useState(0);
  const [spin, setSpin] = useState(null);
  const [spinDisplay, setSpinDisplay] = useState(null);
  const [usedCombos, setUsedCombos] = useState([]);
  const [reSpinUsed, setReSpinUsed] = useState(false);
  const [record, setRecord] = useState(null);
  const [simGames, setSimGames] = useState([]);
  const [points, setPoints] = useState(0);
  const [mode, setMode] = useState("classic"); // classic or blind
  const spinRef = useRef(null);

  const unfilledPositions = useCallback(() => {
    const u = [];
    if (!roster[0]) u.push("QB");
    if (!roster[1]) u.push("RB");
    if (!roster[2]) u.push("WR");
    if (!roster[3]) u.push("TE");
    if (!roster[4]) u.push("WR");
    return [...new Set(u)];
  }, [roster]);

  const getValidCombos = useCallback(() => {
    const uf = unfilledPositions();
    const seen = new Set();
    const combos = [];
    PLAYERS.forEach(p => {
      const key = `${p.t}-${p.d}`;
      if (!usedCombos.includes(key) && uf.includes(p.p) && !seen.has(key)) {
        const hasValidPlayer = PLAYERS.some(
          pp => pp.t === p.t && pp.d === p.d && uf.includes(pp.p) && pp.g >= 8
        );
        if (hasValidPlayer) {
          seen.add(key);
          combos.push({ key, team: p.t, decade: p.d });
        }
      }
    });
    return combos;
  }, [usedCombos, unfilledPositions]);

  const doSpin = useCallback(() => {
    const valid = getValidCombos();
    if (valid.length === 0) return;
    const target = valid[Math.floor(Math.random() * valid.length)];

    setScreen("spinning");
    let ticks = 0;
    const allCombos = [...valid];

    if (spinRef.current) clearInterval(spinRef.current);
    spinRef.current = setInterval(() => {
      const rand = allCombos[Math.floor(Math.random() * allCombos.length)];
      setSpinDisplay(rand);
      ticks++;
      const speed = ticks > 12 ? 200 : ticks > 8 ? 150 : 80;
      if (ticks > 15) {
        clearInterval(spinRef.current);
        setSpinDisplay(target);
        setSpin(target);
        setUsedCombos(prev => [...prev, target.key]);
        setTimeout(() => setScreen("picking"), 600);
      }
    }, 80);
  }, [getValidCombos]);

  const getAvailablePlayers = useCallback(() => {
    if (!spin) return [];
    const uf = unfilledPositions();
    return PLAYERS.filter(p =>
      p.t === spin.team && p.d === spin.decade && uf.includes(p.p) && p.g >= 8
    ).sort((a, b) => playerValue(b) - playerValue(a));
  }, [spin, unfilledPositions]);

  const pickPlayer = useCallback((player) => {
    const nr = [...roster];
    if (player.p === "QB" && !nr[0]) nr[0] = player;
    else if (player.p === "RB" && !nr[1]) nr[1] = player;
    else if (player.p === "WR" && !nr[2]) nr[2] = player;
    else if (player.p === "TE" && !nr[3]) nr[3] = player;
    else if (player.p === "WR" && nr[2] && !nr[4]) nr[4] = player;
    setRoster(nr);
    const nextRound = round + 1;
    setRound(nextRound);

    if (nextRound >= 5) {
      setScreen("simulating");
      const wins = simulate(nr);
      const losses = 17 - wins;
      const pts = getPoints(nr);
      setPoints(pts);

      let games = [];
      let w = 0, l = 0;
      for (let i = 0; i < 17; i++) {
        const winsLeft = wins - w;
        const gamesLeft = 17 - i;
        if (l >= losses || Math.random() < winsLeft / gamesLeft) {
          games.push("W"); w++;
        } else {
          games.push("L"); l++;
        }
      }

      let idx = 0;
      const simInterval = setInterval(() => {
        setSimGames(prev => [...prev, games[idx]]);
        idx++;
        if (idx >= 17) {
          clearInterval(simInterval);
          setRecord({ wins, losses, games });
          setTimeout(() => setScreen("results"), 800);
        }
      }, 180);
    } else {
      setScreen("prebattle");
    }
  }, [roster, round]);

  const doRespin = useCallback(() => {
    if (reSpinUsed) return;
    setReSpinUsed(true);
    setScreen("spinning");
    setSpinDisplay(null);

    // Compute valid combos directly to avoid stale closure issues
    const currentKey = spin?.key;
    const newUsedCombos = usedCombos.filter(k => k !== currentKey);
    setUsedCombos(newUsedCombos);

    const uf = [];
    if (!roster[0]) uf.push("QB");
    if (!roster[1]) uf.push("RB");
    if (!roster[2]) uf.push("WR");
    if (!roster[3]) uf.push("TE");
    if (!roster[4]) uf.push("WR");
    const ufs = [...new Set(uf)];

    const seen = new Set();
    const valid = [];
    PLAYERS.forEach(p => {
      const key = `${p.t}-${p.d}`;
      if (!newUsedCombos.includes(key) && ufs.includes(p.p) && !seen.has(key) && p.g >= 8) {
        seen.add(key);
        valid.push({ key, team: p.t, decade: p.d });
      }
    });

    if (valid.length === 0) return;
    const target = valid[Math.floor(Math.random() * valid.length)];

    let ticks = 0;
    if (spinRef.current) clearInterval(spinRef.current);
    spinRef.current = setInterval(() => {
      const rand = valid[Math.floor(Math.random() * valid.length)];
      setSpinDisplay(rand);
      ticks++;
      if (ticks > 15) {
        clearInterval(spinRef.current);
        setSpinDisplay(target);
        setSpin(target);
        setUsedCombos(prev => [...prev, target.key]);
        setTimeout(() => setScreen("picking"), 600);
      }
    }, 80);
  }, [reSpinUsed, spin, usedCombos, roster]);

  const resetGame = () => {
    setScreen("menu");
    setRoster([null, null, null, null, null]);
    setRound(0);
    setSpin(null);
    setSpinDisplay(null);
    setUsedCombos([]);
    setReSpinUsed(false);
    setRecord(null);
    setSimGames([]);
    setPoints(0);
  };

  const statLine = (p) => {
    if (p.p === "QB") return `${p.py.toLocaleString()} YDS / ${p.ptd} TD / ${p.int} INT / ${p.r} RTG`;
    if (p.p === "RB") return `${p.ry.toLocaleString()} YDS / ${p.rtd} TD / ${p.ypc} YPC`;
    return `${p.rec} REC / ${p.recy.toLocaleString()} YDS / ${p.retd} TD`;
  };

  const shortStat = (p) => {
    if (p.p === "QB") return `${p.py.toLocaleString()} yds, ${p.ptd} td`;
    if (p.p === "RB") return `${p.ry.toLocaleString()} yds, ${p.rtd} td`;
    return `${p.rec} rec, ${p.recy.toLocaleString()} yds, ${p.retd} td`;
  };

  const teamName = (abbr) => TEAM_META[abbr]?.name || abbr;

  // ===== SCREENS =====

  // MENU
  if (screen === "menu") return (
    <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center p-6 relative overflow-hidden">
      <div className="absolute inset-0 opacity-5">
        {Array.from({length: 20}).map((_, i) => (
          <div key={i} className="absolute w-full border-t border-green-500"
            style={{top: `${i * 5 + 2}%`, opacity: i % 5 === 0 ? 0.6 : 0.2}} />
        ))}
      </div>
      <div className="relative z-10 text-center">
        <div className="text-green-400 text-xs tracking-[0.3em] uppercase mb-2 font-mono">Can your offense go undefeated?</div>
        <h1 className="text-5xl sm:text-7xl font-black text-white mb-1 tracking-tight">RUN IT</h1>
        <h1 className="text-5xl sm:text-7xl font-black text-green-400 mb-6 tracking-tight">PERFECT</h1>
        <p className="text-gray-500 text-sm max-w-sm mx-auto mb-10 leading-relaxed">
          Draft 5 NFL offensive legends across decades. A simulation engine runs your squad through a full 17-game season. The goal: go 17-0.
        </p>
        <button onClick={() => { setMode("classic"); doSpin(); }}
          className="bg-green-500 hover:bg-green-400 text-gray-950 font-bold text-lg px-10 py-4 rounded-lg transition-all active:scale-95 mb-3 w-64">
          PLAY CLASSIC
        </button>
        <br />
        <button onClick={() => { setMode("blind"); doSpin(); }}
          className="border border-gray-700 hover:border-gray-500 text-gray-400 hover:text-white font-semibold text-sm px-10 py-3 rounded-lg transition-all active:scale-95 w-64">
          PLAY BLIND (stats hidden)
        </button>
        <p className="text-gray-700 text-xs mt-8 font-mono">PROTOTYPE v0.1 — RunItPerfect.com</p>
      </div>
    </div>
  );

  // SPINNING
  if (screen === "spinning") {
    const d = spinDisplay;
    return (
      <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center p-6">
        <div className="text-gray-600 text-xs tracking-widest uppercase mb-8 font-mono">Round {round + 1} of 5</div>
        <div className="w-72 h-40 rounded-xl border-2 border-gray-700 flex flex-col items-center justify-center bg-gray-900 relative overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-b from-green-500/5 to-transparent" />
          {d ? (
            <div className="text-center relative z-10">
              <div className="text-3xl font-black text-white" style={{color: TEAM_META[d.team]?.c || '#fff'}}>
                {d.team}
              </div>
              <div className="text-gray-400 text-sm mt-1">{teamName(d.team)}</div>
              <div className="text-green-400 text-xl font-bold mt-2 font-mono">{d.decade}</div>
            </div>
          ) : (
            <div className="text-gray-600 text-lg">Spinning...</div>
          )}
        </div>
        <div className="flex gap-2 mt-8">
          {SLOT_LABELS.map((s, i) => (
            <div key={i} className={`w-12 h-12 rounded-lg flex items-center justify-center text-xs font-bold
              ${roster[i] ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-gray-800 text-gray-600 border border-gray-700'}`}>
              {roster[i] ? '✓' : s}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // PICKING
  if (screen === "picking") {
    const available = getAvailablePlayers();
    return (
      <div className="min-h-screen bg-gray-950 p-4 sm:p-6">
        <div className="max-w-lg mx-auto">
          <div className="text-center mb-6">
            <div className="text-gray-600 text-xs tracking-widest uppercase font-mono mb-2">Round {round + 1} of 5</div>
            <div className="inline-flex items-center gap-3 bg-gray-900 border border-gray-700 rounded-xl px-6 py-3">
              <span className="text-2xl font-black" style={{color: TEAM_META[spin.team]?.c || '#fff'}}>{spin.team}</span>
              <span className="text-gray-600">|</span>
              <span className="text-green-400 font-bold font-mono">{spin.decade}</span>
            </div>
            <div className="text-gray-500 text-sm mt-2">{teamName(spin.team)} — {spin.decade}</div>
          </div>

          {!reSpinUsed && (
            <button onClick={doRespin}
              className="w-full mb-4 py-2 rounded-lg border border-yellow-600/30 text-yellow-500 text-sm font-semibold hover:bg-yellow-500/10 transition-all">
              RE-SPIN (1 free)
            </button>
          )}

          <div className="text-gray-600 text-xs uppercase tracking-wider mb-3 font-mono">Select a player</div>
          <div className="space-y-2">
            {available.map(p => (
              <button key={p.id} onClick={() => pickPlayer(p)}
                className="w-full text-left bg-gray-900 hover:bg-gray-800 border border-gray-800 hover:border-gray-600 rounded-xl p-4 transition-all active:scale-[0.98] group">
                <div className="flex items-center justify-between">
                  <div>
                    <span className="text-white font-bold text-base group-hover:text-green-400 transition-colors">{p.n}</span>
                    <span className="text-gray-600 text-sm ml-2">{p.p}</span>
                  </div>
                  <span className="text-gray-700 text-xs font-mono">{p.y}</span>
                </div>
                {mode === "classic" && (
                  <div className="text-gray-500 text-xs mt-1 font-mono">{statLine(p)}</div>
                )}
                {mode === "classic" && (
                  <div className="text-gray-700 text-xs mt-1">{p.g} games started</div>
                )}
              </button>
            ))}
          </div>

          <div className="flex gap-2 mt-6 justify-center">
            {SLOT_LABELS.map((s, i) => (
              <div key={i} className={`w-11 h-11 rounded-lg flex items-center justify-center text-xs font-bold
                ${roster[i] ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-gray-800 text-gray-600 border border-gray-700'}`}>
                {roster[i] ? '✓' : s}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // PRE-BATTLE (between rounds, shows current roster)
  if (screen === "prebattle") return (
    <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center p-6">
      <div className="text-gray-600 text-xs tracking-widest uppercase font-mono mb-6">Your Roster — {round}/5 picks</div>
      <div className="w-full max-w-sm space-y-2 mb-8">
        {SLOT_LABELS.map((s, i) => (
          <div key={i} className={`flex items-center justify-between rounded-xl px-4 py-3 border
            ${roster[i] ? 'bg-gray-900 border-gray-700' : 'bg-gray-900/50 border-gray-800 border-dashed'}`}>
            <div className="flex items-center gap-3">
              <span className={`text-xs font-bold font-mono w-8 ${roster[i] ? 'text-green-400' : 'text-gray-700'}`}>{s}</span>
              {roster[i] ? (
                <div>
                  <div className="text-white font-semibold text-sm">{roster[i].n}</div>
                  <div className="text-gray-500 text-xs font-mono">{roster[i].t} — {roster[i].y}</div>
                </div>
              ) : (
                <div className="text-gray-700 text-sm">Empty</div>
              )}
            </div>
            {roster[i] && (
              <div className="text-gray-600 text-xs font-mono">{shortStat(roster[i])}</div>
            )}
          </div>
        ))}
      </div>
      <button onClick={doSpin}
        className="bg-green-500 hover:bg-green-400 text-gray-950 font-bold text-base px-8 py-3 rounded-lg transition-all active:scale-95">
        SPIN ROUND {round + 1}
      </button>
    </div>
  );

  // SIMULATING
  if (screen === "simulating") return (
    <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center p-6">
      <div className="text-green-400 text-xs tracking-[0.3em] uppercase mb-4 font-mono">Simulating Season</div>
      <div className="text-white text-4xl font-black mb-8 font-mono">
        {simGames.filter(g => g === "W").length}-{simGames.filter(g => g === "L").length}
      </div>
      <div className="flex flex-wrap gap-1.5 max-w-xs justify-center">
        {simGames.map((g, i) => (
          <div key={i} className={`w-8 h-8 rounded flex items-center justify-center text-xs font-bold
            ${g === "W" ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
            {g}
          </div>
        ))}
        {Array.from({length: 17 - simGames.length}).map((_, i) => (
          <div key={`e${i}`} className="w-8 h-8 rounded bg-gray-800/50 border border-gray-800" />
        ))}
      </div>
      <div className="text-gray-600 text-xs mt-4 font-mono">Week {simGames.length} / 17</div>
    </div>
  );

  // RESULTS
  if (screen === "results" && record) {
    const isPerfect = record.wins === 17;
    return (
      <div className="min-h-screen bg-gray-950 p-4 sm:p-6">
        <div className="max-w-md mx-auto">
          {/* Results Card */}
          <div className={`rounded-2xl p-6 border ${isPerfect ? 'bg-gradient-to-b from-yellow-500/10 to-gray-900 border-yellow-500/30' : 'bg-gray-900 border-gray-700'}`}>
            <div className="text-center mb-6">
              <div className={`text-xs tracking-[0.3em] uppercase mb-2 font-mono ${isPerfect ? 'text-yellow-400' : 'text-gray-600'}`}>
                {isPerfect ? 'PERFECT SEASON' : 'SEASON RESULT'}
              </div>
              <div className={`text-6xl font-black font-mono ${isPerfect ? 'text-yellow-400' : 'text-white'}`}>
                {record.wins}-{record.losses}
              </div>
              <div className="text-gray-500 text-sm mt-2 font-mono">{points} PTS</div>
              <div className="text-gray-600 text-xs mt-1">{mode === "blind" ? "Blind Mode" : "Classic"}</div>
            </div>

            <div className="space-y-1.5">
              {SLOT_LABELS.map((s, i) => roster[i] && (
                <div key={i} className="flex items-center justify-between bg-gray-800/50 rounded-lg px-3 py-2">
                  <div className="flex items-center gap-2">
                    <span className="text-green-400 text-xs font-bold font-mono w-7">{s}</span>
                    <span className="text-white text-sm font-semibold">{roster[i].n}</span>
                  </div>
                  <div className="text-right">
                    <span className="text-gray-500 text-xs font-mono">{roster[i].t} {roster[i].y}</span>
                  </div>
                </div>
              ))}
            </div>

            <div className="flex flex-wrap gap-1 mt-4 justify-center">
              {record.games.map((g, i) => (
                <div key={i} className={`w-6 h-6 rounded text-[10px] flex items-center justify-center font-bold
                  ${g === "W" ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                  {g}
                </div>
              ))}
            </div>

            <div className="text-center mt-4">
              <div className="text-gray-700 text-xs font-mono">RunItPerfect.com</div>
            </div>
          </div>

          <div className="flex gap-3 mt-6">
            <button onClick={resetGame}
              className="flex-1 bg-green-500 hover:bg-green-400 text-gray-950 font-bold py-3 rounded-lg transition-all active:scale-95">
              PLAY AGAIN
            </button>
          </div>

          {isPerfect && (
            <div className="text-center mt-6">
              <div className="text-yellow-400 text-2xl mb-1">🏆</div>
              <div className="text-yellow-400 text-sm font-bold">You ran it perfect.</div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return <div className="min-h-screen bg-gray-950 flex items-center justify-center text-gray-500">Loading...</div>;
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RunItPerfect));
</script>
</body>
</html>
